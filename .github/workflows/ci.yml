name: CI

on:
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: RS

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format RS.sln --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build RS.sln --no-restore

      - name: Test
        run: dotnet test RS.sln --no-build --verbosity normal